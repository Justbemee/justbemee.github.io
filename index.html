<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Martin Hanispak</title>

    <script>
const quotes = [
    { text: "The artist must train not only his eye but also his soul.", source: "Terrence McKenna", image: "images/Memory.webp" },
    { text: "Nature loves courage.", source: "Terrence McKenna", image: "images/Heart.webp" },
    { text: "The only way to make sense out of change is to plunge into it.", source: "Terrence McKenna", image: "images/Love.webp" }
];

let current = 0;

function showQuote() {
    const q = quotes[current];
    document.getElementById('quote-text').textContent = '"' + q.text + '"';
    document.getElementById('quote-image').src = q.image;
    document.getElementById('quote-source').textContent = '— ' + q.source;
    current = (current + 1) % quotes.length;
}

showQuote();
setInterval(showQuote, 8000); // changes every 8 seconds
</script>
