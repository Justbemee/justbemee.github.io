<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martin Hanispak</title>
    <link rel="icon" href="images/Memory.webp">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/Memory.webp" alt="Martin Hanispak">
            </a>
            <!-- iPhone dark mode slider - far right -->
            <label class="switch">
                <input type="checkbox" id="dark-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </nav>

    <h1 style="margin: 15px 40px 15px; font-size: 2.8rem; font-family: 'Playfair Display', serif; font-weight:400;">Martin Hanispak</h1>

    <div style="display:flex; max-width:1100px; margin:0 auto; padding:0 40px; gap:60px;">
        <!-- Left thumbnails -->
        <div class="home-list" style="flex:1;">
            <a href="about.html" class="item">
                <img src="images/Memory.webp" alt="">
                <span>About</span>
            </a>
            <a href="gallery.html" class="item">
                <img src="images/Lost Acrylic on Canvas.webp" alt="">
                <span>Portfolio</span>
            </a>
            <a href="contact.html" class="item">
                <img src="images/Love.webp" alt="">
                <span>Contact</span>
            </a>
            <a href="thoughts.html" class="item">
                <img src="images/The face of Flower.webp" alt="">
                <span>Thoughts</span>
            </a>
            <a href="consulting.html" class="item">
                <img src="images/Acrylic on Canvas Reused.webp" alt="">
                <span>Consulting</span>
            </a>
        </div>

        <!-- Right quote slideshow -->
        <div class="quote-section" style="flex:1; max-width:380px; padding-top:40px;">
            <div class="quote">
                <p class="quote-text" id="quote-text" style="font-style:italic; font-size:1.15rem; color:#333; margin-bottom:20px;"></p>
                <img id="quote-image" src="" alt="" style="width:160px; height:160px; object-fit:cover; border-radius:12px; margin:15px auto; display:block;">
                <p class="source" id="quote-source" style="font-size:0.95rem; opacity:0.7;"></p>
            </div>
        </div>
    </div>

    <script>
    const toggle = document.getElementById('dark-toggle');
    toggle.addEventListener('change', () => {
        document.body.classList.toggle('dark', toggle.checked);
    });

    // Quote slideshow
    const quotes = [ /* same 5 quotes as before */ ];
    const allImages = [ /* same 26 images as before */ ];
    let current = 0;
    function showQuote() {
        const q = quotes[current % quotes.length];
        const img = allImages[current % allImages.length];
        document.getElementById('quote-text').textContent = '"' + q.text + '"';
        document.getElementById('quote-image').src = img;
        document.getElementById('quote-source').textContent = '— ' + q.source;
        current++;
    }
    showQuote();
    setInterval(showQuote, 8000);
    </script>
</body>
</html>
