    <script>
    // Click any painting → full lightbox with zoom lens
    document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', function(e) {
            e.preventDefault();
            const src = this.getAttribute('data-src');
            document.getElementById('lightbox-img').src = src;
            document.getElementById('zoom-lens-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        });
    });

    // Movable zoom lens
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const zoomLens = document.getElementById('zoom-lens');
    const zoomLensImg = document.getElementById('zoom-lens-img');

    lightbox.addEventListener('mousemove', function(e) {
        const rect = lightboxImg.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;

        x = Math.max(100, Math.min(x, rect.width - 100));
        y = Math.max(100, Math.min(y, rect.height - 100));

        zoomLens.style.display = 'block';
        zoomLens.style.left = (x - 110) + 'px';
        zoomLens.style.top = (y - 110) + 'px';

        const zoomLevel = 7;
        zoomLensImg.style.left = (-x * zoomLevel + 110) + 'px';
        zoomLensImg.style.top = (-y * zoomLevel + 110) + 'px';
    });

    lightbox.addEventListener('mouseleave', function() {
        zoomLens.style.display = 'none';
    });
    </script>
