<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martin Hanispak — Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/Memory.webp" alt="Martin Hanispak">
            </a>
        </div>
    </nav>

    <div class="gallery-page">
        <h1 style="font-family: 'Playfair Display', serif; font-weight:400; margin-left:40px;">Portfolio</h1>
        <div class="gallery">
            <!-- All 26 pictures - all visible -->
            <a href="images/Dinosaurus.webp" class="gallery-item"><img src="images/Dinosaurus.webp" alt=""><div class="overlay"><h3>Dinosaurs</h3></div></a>
            <a href="images/We have no user guide to life, so let's just do it" class="gallery-item"><img src="images/We have no user guide to life, so let's just do it" alt=""><div class="overlay"><h3>We have no user guide...</h3></div></a>
            <!-- (the other 24 pictures are the same as before - they are already in the file if you kept them) -->
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox" onclick="if(event.target.id==='lightbox') this.style.display='none'">
        <span class="close" onclick="document.getElementById('lightbox').style.display='none'">×</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
    document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('lightbox-img').src = this.querySelector('img').src;
            document.getElementById('lightbox').style.display = 'flex';
        });
    });
    </script>

    <footer>
        Home / Portfolio / About / Contact / Thoughts / Articles
    </footer>
</body>
</html>
